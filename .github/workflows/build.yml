name: Build & Release APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=APPWRITE_ENDPOINT=${{ secrets.APPWRITE_ENDPOINT }} \
            --dart-define=APPWRITE_PROJECT_ID=${{ secrets.APPWRITE_PROJECT_ID }} \
            --dart-define=APPWRITE_DATABASE_ID=${{ secrets.APPWRITE_DATABASE_ID }} \
            --dart-define=APPWRITE_RESET_PASSWORD_FUNCTION_ID=${{ secrets.APPWRITE_RESET_PASSWORD_FUNCTION_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-banking-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7