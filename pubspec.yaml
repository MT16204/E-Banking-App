name: banking_app
description: "Nova - Digital Banking App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Icons
  lucide_icons: ^0.257.0

  # Backend & Database
  appwrite: ^12.0.0

  # UI & Fonts
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  pinput: ^5.0.0

  # State Management
  flutter_bloc: ^9.1.0
  provider: ^6.1.5+1

  # Security & Local Storage
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # QR & Payment
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Localization & Formatting
  intl: ^0.20.2

  #Video player
  video_player: ^2.9.2
  shared_preferences: ^2.5.5

dependency_overrides:
  flutter_web_auth_2: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/success.mp4
    - assets/images/
    - assets/icons/
    - assets/splash.gif
    - assets/success.mp4
